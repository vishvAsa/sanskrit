<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
    <!-- Styles -->
    <style>
        .title-box { fill: #FFFBEA; stroke: #D6C29A; stroke-width: 1; }
        .main-box { fill: #FFFFFF; stroke: #000000; stroke-width: 1; }
        .final-box { fill: #FFFFFF; stroke: #000000; stroke-width: 2; }
        .key-box { fill: #F0FFF0; stroke: #A0C0A0; stroke-width: 1; }
        .text-main { font-family: 'Arial', sans-serif; font-size: 14px; text-anchor: middle; }
        .text-small { font-family: 'Arial', sans-serif; font-size: 12px; text-anchor: middle; }
        .text-list { font-family: 'Arial', sans-serif; font-size: 12px; text-anchor: start; }
        .highlight { fill: yellow; }
        .connector { stroke: black; stroke-width: 1.5; marker-end: url(#arrow); }
    </style>

    <!-- Arrowhead Definition -->
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5"
                markerWidth="6" markerHeight="6"
                orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
        </marker>
    </defs>

    <!-- Title -->
    <rect x="250" y="10" width="500" height="40" class="title-box"/>
    <text x="500" y="35" class="text-main" font-size="16px" font-weight="bold">धातुविज्ञानम् - ३ (धातूनां स्वरविज्ञानम् - पदव्यवस्था)</text>

    <!-- Central Node -->
    <rect x="375" y="100" width="250" height="40" class="main-box"/>
    <text x="500" y="125" class="text-main" font-weight="bold">धातौ इत्संज्ञकवर्णः</text>

    <!-- Connectors from Central Node -->
    <line x1="500" y1="140" x2="500" y2="170" stroke="black" stroke-width="1.5"/>
    <line x1="200" y1="170" x2="800" y2="170" stroke="black" stroke-width="1.5"/>
    <path class="connector" d="M 500 170 L 200 170 L 200 200"/>
    <path class="connector" d="M 500 170 L 500 200"/>
    <path class="connector" d="M 500 170 L 800 170 L 800 200"/>


    <!-- Left Branch -->
    <g id="left-branch">
        <rect x="100" y="200" width="200" height="80" class="main-box"/>
        <text x="200" y="220" class="text-small" font-weight="bold">अनुदात्तङित् (अनुदात्तस्वरस्य ङित्-संज्ञा)</text>
        <rect x="145" y="228" width="40" height="14" class="highlight"/>
        <text x="165" y="240" class="text-small" font-weight="bold">अथवा</text>
        <text x="110" y="260" class="text-list">• ङकारस्य इत्-संज्ञा</text>

        <path class="connector" d="M 200 280 L 200 310"/>

        <rect x="75" y="310" width="250" height="60" class="main-box"/>
        <text x="200" y="330" class="text-main" font-weight="bold">अनुदात्तङित आत्मनेपदम् (१.३.१२)</text>
        <text x="200" y="350" class="text-small">अनुवृत्ति-सहितसूत्रम्- अनुदात्तङितः धातोः तस्य</text>
        <text x="200" y="365" class="text-small">आत्मनेपदम्</text>

        <path class="connector" d="M 200 370 L 200 450"/>

        <rect x="125" y="450" width="150" height="40" class="final-box"/>
        <text x="200" y="475" class="text-main" font-weight="bold">आत्मनेपदिधातुः</text>
    </g>

    <!-- Middle Branch -->
    <g id="middle-branch">
        <rect x="400" y="200" width="200" height="80" class="main-box"/>
        <text x="500" y="220" class="text-small" font-weight="bold">स्वरितेत् (स्वरितस्वरस्य इत्-संज्ञा)</text>
        <rect x="445" y="228" width="40" height="14" class="highlight"/>
        <text x="465" y="240" class="text-small" font-weight="bold">अथवा</text>
        <text x="410" y="260" class="text-list">• ञकारस्य इत्-संज्ञा</text>

        <path class="connector" d="M 500 280 L 500 310"/>

        <rect x="375" y="310" width="250" height="60" class="main-box"/>
        <text x="500" y="330" class="text-main" font-weight="bold">स्वरितञितः कर्त्रभिप्रायेक्रियाफले (१.३.७२)</text>
        <text x="500" y="350" class="text-small">अनुवृत्ति-सहितसूत्रम्- स्वरितञितः धातोः कर्त्रभिप्राये</text>
        <text x="500" y="365" class="text-small">क्रियाफले तस्य आत्मनेपदम्</text>

        <path class="connector" d="M 500 370 L 500 450"/>

        <rect x="425" y="450" width="150" height="40" class="main-box"/>
        <text x="500" y="475" class="text-main" font-weight="bold">उभयपदिधातु</text>
    </g>

    <!-- Right Branch -->
    <g id="right-branch">
        <rect x="700" y="200" width="200" height="80" class="main-box"/>
        <text x="800" y="220" class="text-small" font-weight="bold">उदात्तेत् (उदात्तस्वरस्य इत्-संज्ञा)</text>
        <rect x="745" y="228" width="40" height="14" class="highlight"/>
        <text x="765" y="240" class="text-small" font-weight="bold">अथवा</text>
        <text x="800" y="260" class="text-small">अनुदात्तेत्, ङित्, स्वरितेत्, ञित् च भिन्नाः</text>

        <path class="connector" d="M 800 280 L 800 310"/>

        <rect x="675" y="310" width="250" height="60" class="main-box"/>
        <text x="800" y="330" class="text-main" font-weight="bold">शेषात्कर्तरि परस्मैपदम् (१.३.७८)</text>
        <text x="800" y="350" class="text-small">अनुवृत्ति-सहितसूत्रम्- शेषात् धातोः कर्तरि</text>
        <text x="800" y="365" class="text-small">तस्य परस्मैपदम्</text>

        <path class="connector" d="M 800 370 L 800 450"/>

        <rect x="725" y="450" width="150" height="40" class="final-box"/>
        <text x="800" y="475" class="text-main" font-weight="bold">परस्मैपदिधातुः</text>
    </g>

    <!-- Bottom Connections -->
    <g id="bottom-connectors">
        <line x1="275" y1="470" x2="425" y2="470" stroke="black" stroke-width="1.5"/>
        <text x="350" y="465" fill="black" font-size="12px" font-weight="bold">आम्</text>

        <line x1="575" y1="470" x2="725" y2="470" stroke="black" stroke-width="1.5"/>
        <rect x="645" y="462" width="10" height="15" fill="red" stroke="black" stroke-width="1"/>

        <rect x="425" y="520" width="150" height="30" class="main-box"/>
        <text x="500" y="540" class="text-small">क्रियायाः फलं कर्तृ</text>

        <path class="connector" d="M 500 490 L 500 520"/>
    </g>


    <!-- Key Boxes -->
    <g id="keys">
        <!-- Top Left Key -->
        <rect x="20" y="70" width="150" height="90" class="key-box"/>
        <text x="95" y="85" class="text-small" font-weight="bold">पदव्यवस्था (इत्-संज्ञकेन)</text>
        <text x="30" y="105" class="text-list">• परस्मैपदिधातुः</text>
        <text x="30" y="125" class="text-list">• आत्मनेपदिधातुः</text>
        <text x="30" y="145" class="text-list">• उभयपदिधातुः</text>

        <!-- Top Right Key -->
        <rect x="800" y="70" width="180" height="95" class="key-box"/>
        <text x="890" y="85" class="text-small" font-weight="bold">स्वरचिह्नानि</text>
        <text x="810" y="105" class="text-list">अनुदात्तः - ᳘ (उदात्तस्वरस्य निम्नम्)</text>
        <text x="810" y="120" class="text-list">स्वरितः - ᳚ (उदात्तात् परम्)</text>
        <text x="810" y="135" class="text-list">उदात्तः - ॑ (उदात्तस्वरम्)</text>
        <text x="810" y="150" class="text-list">अनुनासिकः-  ँ (उदात्तात् अनुनासिकम्)</text>

        <!-- Highlighting in Key -->
        <rect x="860" y="93" width="10" height="12" style="fill:yellow; opacity:0.7;"/>
        <rect x="850" y="108" width="10" height="12" style="fill:yellow; opacity:0.7;"/>
        <rect x="850" y="123" width="10" height="12" style="fill:yellow; opacity:0.7;"/>

    </g>

</svg>